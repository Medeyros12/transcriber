<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA Transcriber</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        .container {
            background-color: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .results {
            margin-top: 24px;
        }
        .result-card {
            background-color: #ecf0f1;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            word-wrap: break-word;
        }
        .ipa-display {
            font-size: 1.2em;
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 16px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <h1>IPA Transcriber</h1>
    
    <div class="container">
        <div class="form-group">
            <label for="ipaInput">IPA Text (e.g., /ˈka.za/, /pãw̃/ or /kæt/)</label>
            <input type="text" id="ipaInput" placeholder="Enter IPA symbols...">
        </div>
        
        <div class="form-group">
            <label for="langSelect">Target Language</label>
            <select id="langSelect">
                <option value="pt-BR">Português Brasileiro</option>
                <option value="en-US">American English</option>
            </select>
        </div>
        
        <button onclick="transcribe()">Transcribe</button>
        
        <div class="results" id="resultsArea">
            </div>
    </div>

    <script>
        // Start of code segment generated by Google Gemini 1.5 Pro
        const mappings = {
            "pt-BR": {
                // Vowels
                "a": ["A"], "stressed_a": ["Á", "A"],
                "ɛ": ["E"], "stressed_ɛ": ["É"],
                "e": ["E"], "stressed_e": ["Ê", "E"],
                "i": ["I"], "stressed_i": ["Í", "I"],
                "ɔ": ["O"], "stressed_ɔ": ["Ó"],
                "o": ["O"], "stressed_o": ["Ô", "O"],
                "u": ["U"], "stressed_u": ["Ú", "U"],
                "ə": ["A", "E"], "ʌ": ["A"], "æ": ["E", "A"],
                
                // Nasal Vowels (Precomposed and combining characters)
                "ã": ["Ã", "AM", "AN"], "a\u0303": ["Ã", "AM", "AN"], "stressed_a\u0303": ["Ã", "AM", "AN"],
                "ẽ": ["EM", "EN"], "e\u0303": ["EM", "EN"], "stressed_e\u0303": ["EM", "EN"],
                "ĩ": ["IM", "IN"], "i\u0303": ["IM", "IN"], "stressed_i\u0303": ["ÍM", "ÍN", "IM", "IN"],
                "õ": ["Õ", "OM", "ON"], "o\u0303": ["Õ", "OM", "ON"], "stressed_o\u0303": ["Õ", "OM", "ON"],
                "ũ": ["UM", "UN"], "u\u0303": ["UM", "UN"], "stressed_u\u0303": ["ÚM", "ÚN", "UM", "UN"],
                "w̃": ["O", "M"], "w\u0303": ["O", "M"],

                // Consonants
                "p": ["P"], "b": ["B"], "t": ["T"], "d": ["D"],
                "k": ["C", "K", "QU"], 
                "g": ["G", "GU"],
                "f": ["F"], "v": ["V"],
                "s": ["S", "SS", "C", "Ç"],
                "z": ["Z", "S", "X"],
                "ʃ": ["CH", "X"], "ʒ": ["J", "G"],
                "m": ["M"], "n": ["N"], "ɲ": ["NH"], "ŋ": ["N"],
                "l": ["L"], "ʎ": ["LH"],
                "ɾ": ["R"], "ʁ": ["R", "RR"], "h": ["R", "H"],
                "w": ["U"], "j": ["I"],
                "θ": ["S", "T"], "ð": ["D", "Z"],
                "ɹ": ["R"], "tʃ": ["TCH", "CH"], "dʒ": ["DJ", "DI"]
								"ɡw": ["GU"]
            },
            "en-US": {
                // Vowels
                "i": ["EE", "EA", "Y", "E"], "ɪ": ["I"],
                "eɪ": ["A", "AY", "A_E"], "ɛ": ["E", "EA"],
                "æ": ["A"], "ɑ": ["O", "A"], "ɔ": ["AW", "AU", "O"],
                "oʊ": ["O", "OA", "O_E"], "ʊ": ["U", "OO"],
                "u": ["OO", "U", "U_E"], "ʌ": ["U", "O"],
                "ə": ["A", "E", "O", "U"],
                "a": ["A"], "e": ["E"], "o": ["O"],
                
                // Nasal Vowels (Appending N)
                "ã": ["AN"], "a\u0303": ["AN"],
                "ẽ": ["EN"], "e\u0303": ["EN"],
                "ĩ": ["IN"], "i\u0303": ["IN"],
                "õ": ["ON"], "o\u0303": ["ON"],
                "ũ": ["UN"], "u\u0303": ["UN"],
                "w̃": ["WN"], "w\u0303": ["WN"],
								"ã"+"w̃": ["AWN"], "aw\u0303w\u0303": ["AWN"],

                // Consonants
                "p": ["P"], "b": ["B"], "t": ["T"], "d": ["D"],
                "k": ["C", "K", "CK", "CH"], "g": ["G"],
                "f": ["F", "PH"], "v": ["V"],
                "θ": ["TH"], "ð": ["TH"],
                "s": ["S", "C"], "z": ["Z", "S"],
                "ʃ": ["SH", "TI", "CI"], "ʒ": ["J", "G"],
                "h": ["H"], "tʃ": ["CH", "TCH"], "dʒ": ["J", "G", "DG", "DJ"],
                "m": ["M"], "n": ["N"], "ŋ": ["NG"],
                "l": ["L"], "ɹ": ["R"], "ɾ": ["T", "D", "R"],
                "j": ["Y"], "w": ["W"],
                "ɲ": ["NY"], "ʎ": ["LY", "LL"], "ʁ": ["H", "R"]
            }
        };

        const vowelsSet = new Set(['a', 'ɛ', 'e', 'i', 'ɔ', 'o', 'u', 'ə', 'ʌ', 'æ', 'ɑ', 'ɪ', 'ʊ', 'ã', 'ẽ', 'ĩ', 'õ', 'ũ', 'a\u0303', 'e\u0303', 'i\u0303', 'o\u0303', 'u\u0303']);

        function tokenizeIPA(ipa, lang) {
            let cleanIpa = ipa.replace(/[\/\.]/g, '').trim();
            let tokens = [];
            let i = 0;
            let isStressed = false;
            
            while (i < cleanIpa.length) {
                let char = cleanIpa[i];

                if (char === 'ˈ' || char === 'ˌ') {
                    isStressed = true;
                    i++;
                    continue;
                }

                let currentToken = char;
                let skip = 1;

                if (i + 1 < cleanIpa.length && cleanIpa[i+1] === '\u0303') {
                    currentToken += cleanIpa[i+1];
                    skip = 2;
                } 
                else if (i + 1 < cleanIpa.length) {
                    let twoChar = cleanIpa.substring(i, i + 2);
                    if (mappings["pt-BR"][twoChar] || mappings["en-US"][twoChar]) {
                        currentToken = twoChar;
                        skip = 2;
                    }
                }

                if (isStressed && vowelsSet.has(currentToken)) {
                    let stressedKey = "stressed_" + currentToken;
                    if (mappings[lang] && mappings[lang][stressedKey]) {
                        currentToken = stressedKey;
                    }
                    isStressed = false;
                } else if (isStressed && vowelsSet.has(currentToken[0])) {
                    isStressed = false;
                }

                tokens.push(currentToken);
                i += skip;
            }
            return tokens;
        }
        // End of code segment generated by Google Gemini 1.5 Pro

        function getCombinations(arrays) {
            if (arrays.length === 0) return [[]];
            let result = [];
            let rest = getCombinations(arrays.slice(1));
            for (let value of arrays[0]) {
                for (let r of rest) {
                    result.push([value, ...r]);
                }
            }
            return result;
        }

        function filterPtBrCombinations(word) {
            return word.replace(/_E/g, 'E'); 
        }

        function transcribe() {
            const inputField = document.getElementById('ipaInput').value;
            const lang = document.getElementById('langSelect').value;
            const resultsArea = document.getElementById('resultsArea');
            
            resultsArea.innerHTML = ''; 

            if (!inputField) return;

            const cleanInputText = inputField.replace(/\//g, '');
            const ipaDisplay = document.createElement('div');
            ipaDisplay.className = 'ipa-display';
            ipaDisplay.textContent = `/${cleanInputText}/`;
            resultsArea.appendChild(ipaDisplay);

            // Start of code segment generated by Google Gemini 1.5 Pro
            const tokens = tokenizeIPA(cleanInputText, lang);
            // End of code segment generated by Google Gemini 1.5 Pro
            const currentMap = mappings[lang];
            let possibleGraphemes = [];

            for (let token of tokens) {
                if (currentMap[token]) {
                    possibleGraphemes.push(currentMap[token]);
                } else {
                    possibleGraphemes.push([token.toUpperCase()]);
                }
            }

            let combinations = getCombinations(possibleGraphemes);
            
            let finalWords = new Set();
            for (let combo of combinations) {
                let rawWord = combo.join('').toUpperCase();
                
                if (lang === 'pt-BR') {
                    rawWord = filterPtBrCombinations(rawWord);
                } else {
                    rawWord = rawWord.replace(/_E/g, 'E'); 
                }
                
                finalWords.add(rawWord);
            }

            if (finalWords.size === 0) {
                resultsArea.innerHTML += '<p>Nenhuma transcrição encontrada.</p>';
            } else {
                finalWords.forEach(word => {
                    let card = document.createElement('div');
                    card.className = 'result-card';
                    card.textContent = word;
                    resultsArea.appendChild(card);
                });
            }
        }
    </script>

</body>
</html>
